name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

- name: Install package
        run: pip install -e sql5_pypi

    - name: Verify installation
        run: python -c "import sql5; print(sql5.__version__)"