name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: macos-arm64
            ext: ''
          - os: macos-latest
            platform: macos-x86_64
            ext: ''
          - os: ubuntu-latest
            platform: linux-x86_64
            ext: ''
          - os: windows-latest
            platform: windows-x86_64
            ext: '.exe'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release
        run: cargo build --release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sql5-${{ matrix.platform }}
          path: target/release/sql5

  upload:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download sql5-macos-arm64
        uses: actions/download-artifact@v4
        with:
          name: sql5-macos-arm64
          path: upload/macos-arm64

      - name: Download sql5-macos-x86_64
        uses: actions/download-artifact@v4
        with:
          name: sql5-macos-x86_64
          path: upload/macos-x86_64

      - name: Download sql5-linux-x86_64
        uses: actions/download-artifact@v4
        with:
          name: sql5-linux-x86_64
          path: upload/linux-x86_64

      - name: Download sql5-windows-x86_64
        uses: actions/download-artifact@v4
        with:
          name: sql5-windows-x86_64
          path: upload/windows-x86_64

      - name: List files
        run: ls -laR upload/

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            upload/macos-arm64/sql5
            upload/macos-x86_64/sql5
            upload/linux-x86_64/sql5
            upload/windows-x86_64/sql5-windows.exe
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}