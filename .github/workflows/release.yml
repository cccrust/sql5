name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: arm64
            name: macos-arm64
          - platform: x86_64
            name: macos-x86_64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo build --release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: target/release/sql5

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo build --release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-x86_64
          path: target/release/sql5

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo build --release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-x86_64
          path: target/release/sql5.exe

  upload:
    needs: [build-macos, build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Wait for release
        run: |
          TAG=${{ github.ref_name }}
          echo "Waiting for release $TAG to be created..."
          for i in {1..30}; do
            if gh release view "$TAG" >/dev/null 2>&1; then
              echo "Release found!"
              break
            fi
            echo "Waiting... ($i)"
            sleep 2
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to Release
        run: |
          TAG=${{ github.ref_name }}
          cd artifacts
          
          cp macos-arm64/sql5 sql5-macos-arm64
          cp macos-x86_64/sql5 sql5-macos-x86_64
          cp linux-x86_64/sql5 sql5-linux-x86_64
          
          gh release upload "$TAG" sql5-macos-arm64 --clobber
          gh release upload "$TAG" sql5-macos-x86_64 --clobber
          gh release upload "$TAG" sql5-linux-x86_64 --clobber
          gh release upload "$TAG" windows-x86_64/sql5.exe --clobber
          
          echo "Done!"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}