name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: macos-arm64
            ext: ''
          - os: macos-latest
            platform: macos-x86_64
            ext: ''
          - os: ubuntu-latest
            platform: linux-x86_64
            ext: ''
          - os: windows-latest
            platform: windows-x86_64
            ext: '.exe'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release
        run: cargo build --release

      - name: Rename binary
        run: |
          cp target/release/sql5 target/release/sql5-${{ matrix.platform }}${{ matrix.ext }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sql5-${{ matrix.platform }}${{ matrix.ext }}
          path: target/release/sql5-${{ matrix.platform }}${{ matrix.ext }}

  upload:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download sql5-macos-arm64
        uses: actions/download-artifact@v4
        with:
          name: sql5-macos-arm64
          path: upload

      - name: Download sql5-macos-x86_64
        uses: actions/download-artifact@v4
        with:
          name: sql5-macos-x86_64
          path: upload

      - name: Download sql5-linux-x86_64
        uses: actions/download-artifact@v4
        with:
          name: sql5-linux-x86_64
          path: upload

      - name: Download sql5-windows-x86_64.exe
        uses: actions/download-artifact@v4
        with:
          name: sql5-windows-x86_64.exe
          path: upload

      - name: List files
        run: ls -laR upload/

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: upload/*
          draft: false
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}