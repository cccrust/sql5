name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: macos-arm64
            ext: ''
          - os: macos-latest
            platform: macos-x86_64
            ext: ''
          - os: ubuntu-latest
            platform: linux-x86_64
            ext: ''
          - os: windows-latest
            platform: windows-x86_64
            ext: '.exe'

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo build --release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sql5-${{ matrix.platform }}
          path: target/release/sql5${{ matrix.ext }}

  upload:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Rename binaries
        run: |
          cd artifacts
          mv sql5-macos-arm64 sql5-macos-arm64-bin
          mv sql5-macos-x86_64 sql5-macos-x86_64-bin
          mv sql5-linux-x86_64 sql5-linux-x86_64-bin
          mv sql5-windows-x86_64.exe sql5-windows.exe

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/sql5-macos-arm64-bin
            artifacts/sql5-macos-x86_64-bin
            artifacts/sql5-linux-x86_64-bin
            artifacts/sql5-windows.exe
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}