name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build-all:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            name: macos-x86_64
          - target: aarch64-apple-darwin
            name: macos-arm64
          - target: x86_64-unknown-linux-gnu
            name: linux-x86_64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        run: |
          rustup install stable
          rustup target add ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: target/${{ matrix.target }}/release/sql5

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo build --release

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: windows-x86_64
          path: target/release/sql5.exe

  upload:
    needs: [build-all, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download all
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List
        run: ls -laR artifacts/

      - name: Upload
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/macos-arm64/sql5
            artifacts/macos-x86_64/sql5
            artifacts/linux-x86_64/sql5
            artifacts/windows-x86_64/sql5.exe
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}